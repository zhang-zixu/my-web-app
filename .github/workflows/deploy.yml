name: Build and Push Image

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/my-web-app

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate required secrets
        run: |
          missing=()
          [ -z "${{ secrets.DOCKER_USERNAME }}" ] && missing+=("DOCKER_USERNAME")
          [ -z "${{ secrets.DOCKER_PASSWORD }}" ] && missing+=("DOCKER_PASSWORD")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::缺少 GitHub Secrets: ${missing[*]}"
            echo "请在仓库 Settings → Secrets and variables → Actions 中配置以上密钥"
            exit 1
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE_NAME }}:latest
