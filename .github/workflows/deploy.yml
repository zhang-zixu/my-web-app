name: Build and Deploy

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/my-web-app
  CONTAINER_NAME: my-web-app

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate required secrets
        run: |
          missing=()
          [ -z "${{ secrets.DOCKER_USERNAME }}" ] && missing+=("DOCKER_USERNAME")
          [ -z "${{ secrets.DOCKER_PASSWORD }}" ] && missing+=("DOCKER_PASSWORD")
          [ -z "${{ secrets.SERVER_HOST }}" ] && missing+=("SERVER_HOST")
          [ -z "${{ secrets.SERVER_USER }}" ] && missing+=("SERVER_USER")
          [ -z "${{ secrets.SERVER_SSH_KEY }}" ] && missing+=("SERVER_SSH_KEY")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::缺少 GitHub Secrets: ${missing[*]}"
            echo "请在仓库 Settings → Secrets and variables → Actions 中配置以上密钥"
            exit 1
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE_NAME }}:latest

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            docker pull ${{ env.IMAGE_NAME }}:latest
            docker stop ${{ env.CONTAINER_NAME }} || true
            docker rm ${{ env.CONTAINER_NAME }} || true
            docker run -d --name ${{ env.CONTAINER_NAME }} -p 80:80 --restart unless-stopped ${{ env.IMAGE_NAME }}:latest
